# trendswd-pk/Ecom-Website  →  atonespotpk-ecom/Ecom-Website  (Vercel deploy)
#
# Secret (trendswd-pk repo): TARGET_REPO_TOKEN
# Token MUST be created while logged in as: atonespotpk-ecom
# Classic PAT → scope: repo (full control)

name: Sync to Vercel GitHub Account

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-to-atonespotpk-ecom
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Important: do not use GITHUB_TOKEN for the push step
          persist-credentials: false

      - name: Push to atonespotpk-ecom/Ecom-Website
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_TOKEN}" ]; then
            echo "::error::TARGET_REPO_TOKEN secret is missing. Add it in Settings → Secrets → Actions."
            exit 1
          fi

          git config user.name "atonespotpk-ecom-sync"
          git config user.email "atonespotpk-ecom-sync@users.noreply.github.com"

          TARGET_URL="https://x-access-token:${TARGET_TOKEN}@github.com/atonespotpk-ecom/Ecom-Website.git"

          git push "${TARGET_URL}" HEAD:refs/heads/main --force
