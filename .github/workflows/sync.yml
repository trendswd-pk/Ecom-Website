# trendswd-pk/Ecom-Website  →  atonespotpk-ecom/Ecom-Website
#
# Setup:
# 1. Login as atonespotpk-ecom → create Classic PAT with scope: repo
# 2. trendswd-pk/Ecom-Website → Settings → Secrets → Actions
#    Name: TARGET_REPO_TOKEN  (exact spelling)

name: Sync to Vercel GitHub Account

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-to-atonespotpk-ecom
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify TARGET_REPO_TOKEN
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_TOKEN}" ]; then
            echo "::error::TARGET_REPO_TOKEN is empty. Add it: trendswd-pk/Ecom-Website → Settings → Secrets and variables → Actions"
            exit 1
          fi

          # Trim accidental newlines from copy-paste
          TARGET_TOKEN="$(printf '%s' "${TARGET_TOKEN}" | tr -d '\n\r')"

          USER_HTTP=$(curl -sS -o /tmp/gh_user.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TARGET_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user")

          if [ "${USER_HTTP}" != "200" ]; then
            echo "::error::Token invalid or expired (GitHub /user → HTTP ${USER_HTTP}). Create a new Classic PAT on atonespotpk-ecom with repo scope."
            exit 1
          fi

          LOGIN=$(jq -r '.login' /tmp/gh_user.json)
          echo "Token belongs to GitHub user: ${LOGIN}"

          if [ "${LOGIN}" != "atonespotpk-ecom" ]; then
            echo "::error::Wrong account. Token is for '${LOGIN}' but must be for 'atonespotpk-ecom'. Log in as atonespotpk-ecom and create a new PAT."
            exit 1
          fi

          REPO_HTTP=$(curl -sS -o /tmp/gh_repo.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TARGET_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/atonespotpk-ecom/Ecom-Website")

          if [ "${REPO_HTTP}" != "200" ]; then
            echo "::error::Cannot access atonespotpk-ecom/Ecom-Website (HTTP ${REPO_HTTP}). Create the repo or fix token permissions."
            exit 1
          fi

          CAN_PUSH=$(jq -r '.permissions.push // false' /tmp/gh_repo.json)
          if [ "${CAN_PUSH}" != "true" ]; then
            echo "::error::Token cannot push to this repo. Use Classic PAT with full 'repo' scope (not read-only fine-grained token)."
            exit 1
          fi

          echo "Token OK — push permission confirmed."

      - name: Push to atonespotpk-ecom/Ecom-Website
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.TARGET_REPO_TOKEN }}
        with:
          source-directory: "."
          destination-github-username: "atonespotpk-ecom"
          destination-repository-name: "Ecom-Website"
          user-email: "atonespotpk-ecom-sync@users.noreply.github.com"
          user-name: "atonespotpk-ecom-sync"
          target-branch: "main"
